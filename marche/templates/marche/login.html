{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="bg-success text-white text-center py-4">
                    <h3 class="fw-bold mb-0"><i class="bi bi-person-circle"></i> Connexion</h3>
                    <p class="small opacity-75 mb-0">AgriTech Guinée - Espace Membre</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    {% if form.errors %}
                        <div class="alert alert-danger small rounded-3">
                            Identifiant ou mot de passe incorrect.
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small text-uppercase">Nom d'utilisateur</label>
                            <input type="text" name="username" class="form-control rounded-3 py-2" placeholder="Ex: Agri_Test" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small text-uppercase">Mot de passe</label>
                            <input type="password" name="password" class="form-control rounded-3 py-2" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold rounded-pill shadow-sm mb-3">
                            Se connecter
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="small text-muted mb-0">Pas encore de compte ?</p>
                        <a href="{% url 'inscription' %}" class="text-success fw-bold text-decoration-none small">Créer un compte agriculteur</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
